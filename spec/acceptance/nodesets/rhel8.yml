---
HOSTS:
  server-rhel8.simp.beaker:
    roles:
    - default
    - rsyslog_server
    - el8
    platform: el-8-x86_64
    box: generic/rhel8
    hypervisor: "<%= ENV.fetch('BEAKER_HYPERVISOR', 'vagrant') %>"
    vagrant_memsize: 2048
    vagrant_cpus: 2
    family: rhel-cloud/rhel-8
    gce_machine_type: n1-standard-2
  client-rhel8.simp.beaker:
    roles:
    - rsyslog_client
    - el8
    platform: el-8-x86_64
    box: generic/rhel8
    hypervisor: "<%= ENV.fetch('BEAKER_HYPERVISOR', 'vagrant') %>"
    vagrant_memsize: 2048
    vagrant_cpus: 2
    family: rhel-cloud/rhel-8
    gce_machine_type: n1-standard-2
CONFIG:
  validate: false
  log_level: verbose
  type: aio
  puppet_collection: "<%= ENV.fetch('BEAKER_PUPPET_COLLECTION', 'openvox8') %>"
