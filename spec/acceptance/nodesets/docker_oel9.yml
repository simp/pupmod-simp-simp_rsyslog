---
HOSTS:
  oel9-server:
    roles:
    - default
    - master
    - server
    - rsyslog_server
    platform: el-9-x86_64
    hypervisor: docker
    image: oraclelinux:9
    docker_cmd: '/usr/sbin/init'
    docker_preserve_image: true
    docker_image_commands:
      - 'yum install -y rsync openssl openssh-server'
    dockeropts:
      HostConfig:
        Memory: 536870912
        Privileged: true
  oel9-client:
    roles:
    - rsyslog_client
    platform: el-9-x86_64
    hypervisor: docker
    image: oraclelinux:9
    docker_cmd: '/usr/sbin/init'
    docker_preserve_image: true
    docker_image_commands:
      - 'yum install -y rsync openssl openssh-server'
    dockeropts:
      HostConfig:
        Memory: 536870912
        Privileged: true
CONFIG:
  log_level: verbose
  type: aio
  puppet_collection: "<%= ENV.fetch('BEAKER_PUPPET_COLLECTION', 'openvox8') %>"
