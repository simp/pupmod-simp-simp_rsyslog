---
HOSTS:
  server-oel8.simp.beaker:
    roles:
    - default
    - rsyslog_server
    - el8
    platform: el-8-x86_64
    box: oraclelinux/8
    box_url: https://oracle.github.io/vagrant-projects/boxes/oraclelinux/8.json
    hypervisor: "<%= ENV.fetch('BEAKER_HYPERVISOR', 'vagrant') %>"
    vagrant_memsize: 2048
    vagrant_cpus: 2
    family: sicura-image-build/oracle-linux-8
    gce_machine_type: n1-standard-2
  client-oel8.simp.beaker:
    roles:
    - rsyslog_client
    - el8
    platform: el-8-x86_64
    box: oraclelinux/8
    box_url: https://oracle.github.io/vagrant-projects/boxes/oraclelinux/8.json
    hypervisor: "<%= ENV.fetch('BEAKER_HYPERVISOR', 'vagrant') %>"
    vagrant_memsize: 2048
    vagrant_cpus: 2
    family: sicura-image-build/oracle-linux-8
    gce_machine_type: n1-standard-2
CONFIG:
  log_level: verbose
  type: aio
  puppet_collection: "<%= ENV.fetch('BEAKER_PUPPET_COLLECTION', 'openvox8') %>"
